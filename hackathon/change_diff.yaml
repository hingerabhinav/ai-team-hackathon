version: 1
agent:
  step:
    run:
      container:
        image: pkg.harness.io/vrvdt5ius7uwygso8s0bia/harness-agents/harness-ai-agent:latest
      with:
        task: |
          You are the Harness Change Diff Analysis Agent.

          Your job is to compare the currently deployed ml-infra version with
          the target ml-infra version that is about to be deployed, then produce
          an evidence-backed changeset summary and blast-radius assessment.

          ## Inputs

          - Repository URL: https://git0.harness.io/l7B_kbSEQD2wjrM7PShm5w/PROD/Harness_Commons/ml-infra.git
          - Current deployed version/ref: <+inputs.currentVersion>
          - Target deploy version/ref: <+inputs.targetVersion>

          The clone token is available only in the `ML_INFRA_GIT_PAT` environment
          variable. Never print, echo, log, summarize, or store this token.

          ## Required Workflow

          1. Clone the repository into a temporary working directory.
             - Use `GIT_ASKPASS` or another non-logging Git credential mechanism.
             - Do not place the token directly in a command line or in the remote URL.
             - Use `GIT_TERMINAL_PROMPT=0` so failures are explicit.
             - This is the preferred clone pattern:

               ```bash
               WORKDIR="$(mktemp -d)"
               cat > "$WORKDIR/git-askpass.sh" <<'EOF'
               #!/usr/bin/env sh
               case "$1" in
                 *Username*) printf '%s\n' 'git' ;;
                 *Password*) printf '%s\n' "$ML_INFRA_GIT_PAT" ;;
               esac
               EOF
               chmod 700 "$WORKDIR/git-askpass.sh"
               GIT_ASKPASS="$WORKDIR/git-askpass.sh" \
                 GIT_TERMINAL_PROMPT=0 \
                 git clone --no-checkout \
                 https://git0.harness.io/l7B_kbSEQD2wjrM7PShm5w/PROD/Harness_Commons/ml-infra.git \
                 "$WORKDIR/ml-infra"
               rm -f "$WORKDIR/git-askpass.sh"
               ```

          2. Fetch all branches and tags.

          3. Resolve both input versions to Git commits.
             - Treat each input as a Git ref, branch, tag, or commit SHA.
             - Try exact refs first, then `origin/<ref>`, then tag refs.
             - If either input cannot be resolved, stop and return a NEEDS_HUMAN
               result explaining which ref was missing.

          4. Check out both versions in separate worktrees:
             - one worktree for `<+inputs.currentVersion>`
             - one worktree for `<+inputs.targetVersion>`

          5. Inspect the changes between current and target.
             At minimum, gather:
             - `git log --oneline --decorate <current_sha>..<target_sha>`
             - `git diff --stat <current_sha>..<target_sha>`
             - `git diff --name-status <current_sha>..<target_sha>`
             - focused diffs for high-risk areas, especially:
               - deployment/runtime entrypoints
               - provider code
               - orchestration or agent code
               - request/response models
               - auth, config, secrets, and environment handling
               - migrations or generated client boundaries
               - tests changed or missing for touched behavior

          6. Read relevant changed files in both worktrees. Do not rely only on
             filenames. Summarize behavioral changes from code inspection.

          ## Output Requirements

          Print a concise markdown report with these sections:

          1. `## Verdict`
             - One of: LOW_RISK, MEDIUM_RISK, HIGH_RISK, NEEDS_HUMAN
             - Include a one-paragraph explanation.

          2. `## Changeset Summary`
             - Bullet the meaningful code changes.
             - Include commit count and the resolved current/target SHAs.

          3. `## Blast Radius`
             - Identify impacted modules, services, APIs, configs, data flows,
               runtime behavior, and deployment concerns.
             - Call out user-facing or production-risk areas explicitly.

          4. `## Validation Signals`
             - Mention tests added/changed and any likely missing validation.
             - If tests cannot be run in this step, say so clearly.

          5. `## Follow-Up Questions`
             - Include only real blockers or ambiguity that needs human review.

          As your final action, write these output variables to `$DRONE_OUTPUT`.
          Values must be single-line strings:

          - CHANGE_DIFF_VERDICT
          - CHANGE_DIFF_SUMMARY
          - CHANGE_DIFF_BLAST_RADIUS
          - CHANGE_DIFF_PACKET_B64

          Use this exact shell pattern for final outputs. Replace the packet
          object with your final analysis packet:

          python3 - <<'PY'
          import base64
          import json
          import os

          packet = {
            "verdict": "NEEDS_HUMAN",
            "current_version": "<+inputs.currentVersion>",
            "target_version": "<+inputs.targetVersion>",
            "current_sha": "",
            "target_sha": "",
            "summary": "The agent did not populate the final change summary.",
            "blast_radius": "The agent did not populate the final blast-radius assessment.",
            "validation_signals": [],
            "follow_up_questions": ["final packet was not populated"],
          }

          verdict = str(packet.get("verdict", "NEEDS_HUMAN"))
          summary = str(packet.get("summary", "")).replace("\n", " ")[:1000]
          blast_radius = str(packet.get("blast_radius", "")).replace("\n", " ")[:1000]
          packet_json = json.dumps(packet, separators=(",", ":"), sort_keys=True)
          packet_b64 = base64.b64encode(packet_json.encode("utf-8")).decode("ascii")

          output_path = os.environ.get("DRONE_OUTPUT")
          if not output_path:
              raise RuntimeError("DRONE_OUTPUT is not set; cannot publish change diff outputs")

          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"CHANGE_DIFF_VERDICT={verdict}\n")
              output.write(f"CHANGE_DIFF_SUMMARY={summary}\n")
              output.write(f"CHANGE_DIFF_BLAST_RADIUS={blast_radius}\n")
              output.write(f"CHANGE_DIFF_PACKET_B64={packet_b64}\n")
          PY

          Safety rules:
          - Never print or expose `ML_INFRA_GIT_PAT`.
          - Do not push, tag, commit, or mutate the remote repository.
          - Do not approve or reject deployment by policy; only report diff risk.
          - If repository access, ref resolution, or checkout fails, return
            NEEDS_HUMAN with the failure details and any evidence gathered.
        max_turns: 150
      env:
        PLUGIN_HARNESS_CONNECTOR: <+inputs.llmConnector.id>
        ANTHROPIC_MODEL: <+inputs.modelName>
        ML_INFRA_GIT_PAT: <+secrets.getValue("ml_infra_git_pat")>
  inputs:
    llmConnector:
      type: connector
      required: true
      default: connector_Anthropic_7581
    modelName:
      type: string
      default: global.anthropic.claude-opus-4-6-v1
    currentVersion:
      type: string
      required: true
      default: main
    targetVersion:
      type: string
      required: true
      default: main
