version: 1
agent:
  step:
    run:
      container:
        image: pkg.harness.io/vrvdt5ius7uwygso8s0bia/harness-agents/harness-ai-agent:latest
      with:
        task: |
          ## Goal

          You are the Harness Grafana Service Version Agent. Your job is to query
          Grafana's microservice version dashboards and collect the versions that
          are currently deployed in production environments for a service.

          This agent produces a normalized evidence packet that the auto-approval
          agent can consume as the `service_versions` signal.

          ## Inputs

          - `service`: <+inputs.service>
          - `deploymentMode`: <+inputs.deploymentMode>
          - `prodEnvironments`: <+inputs.prodEnvironments>
          - `lookback`: <+inputs.lookback>
          - `targetVersion`: <+inputs.targetVersion>
          - `nonIeDashboardUrl`: <+inputs.nonIeDashboardUrl>
          - `ieDashboardUrl`: <+inputs.ieDashboardUrl>
          - `maxSeries`: <+inputs.maxSeries>

          ## Dashboard routing

          Use the dashboard selected by `deploymentMode`:

          - `non_ie`: use the Non-IE legacy deployment dashboard:
            `<+inputs.nonIeDashboardUrl>`
          - `ie`: use the Infra Evolution dashboard:
            `<+inputs.ieDashboardUrl>`
          - `auto`: inspect both dashboards and merge production version evidence.

          Known dashboard references:

          - Non-IE UID: `ZJD3rKZIz`, slug: `microservice-version-dashboard`
          - IE UID: `ZJD3rKZI`, slug: `microservice-version-dashboard-ie`

          ## Fast path — use this first

          The known dashboards ultimately read from Prometheus-compatible
          datasources. Do not spend turns listing dashboards, reading saved tool
          result files, grepping dashboard JSON, or discovering datasources unless
          the direct queries below fail.

          In the first assistant turn, call Grafana `query_prometheus` directly for
          the selected `deploymentMode`. In `auto` mode, call all rows below in
          parallel if the tool supports parallel calls.

          | Environments | Mode | datasourceUid | Query shape |
          |---|---|---|---|
          | `prod1`, `prod2`, `prod3` | `non_ie` | `9073961d-07a4-44b8-8bfd-4b32a4ee7a74` | `avg by(image_spec_new, namespace, cluster) (label_replace(kube_pod_container_info{cluster="prod-private-uswest1-primary",namespace=~"prod1|prod2|prod3",container=~"<+inputs.service>"}, "image_spec_new", "$1", "image_spec", ".*:([^\"]+)"))` |
          | `prod0` | `ie` | `eeb117fe-3558-460f-9d5a-cc94eb7e7b76` | `avg by(image_spec_new, namespace, cluster) (label_replace(kube_pod_container_info{namespace="harness",container=~"<+inputs.service>"}, "image_spec_new", "$1", "image_spec", ".*:([^\"]+)"))` |
          | `prod4` | `ie` | `a20760d2-34a0-4019-ac5f-3ba1ad91b406` | same as `prod0` |
          | `eu1` | `ie` | `ff93cb12-d604-4501-bf20-dc2455cfe719` | same as `prod0` |
          | `harness0` | `ie` | `e7cd16b2-aac3-45bd-8084-c2a5c9a6e670` | same as `prod0` |
          | `eu-lloyd` | `ie` | `eek09xibrtmv4f` | same as `prod0`; if this returns HTTP 502, record `eu-lloyd` as missing evidence and continue |

          For every direct query:

          - Use `queryType: "instant"`.
          - Use `endTime: "now"`.
          - Keep the query grouped by `image_spec_new`, `namespace`, and `cluster`
            so each returned series can be mapped to an environment.
          - Extract the version from the `image_spec_new` label.
          - For the Non-IE combined query, map returned `namespace=prod1|prod2|prod3`
            to the matching environment.
          - For IE datasources, map the datasource row above to the environment.
            Prefer returned `cluster` if present.

          Only use `get_dashboard_panel_queries`, `get_dashboard_by_uid`, or
          `list_datasources` as a fallback when a direct query errors because the
          datasource UID is missing, unauthorized, or incompatible.

          ## Required workflow

          1. Use the configured Grafana MCP connector. Do not use Harness MCP for
             this signal unless Grafana tools are unavailable.
          2. Execute the fast-path direct Prometheus queries for the selected mode.
          3. Extract deployed versions. At minimum, produce:
             - environment name
             - version string
             - service name
             - deployment mode / dashboard source
             - timestamp or freshness if available
             - raw series labels that explain where the version came from
          4. Compare collected versions to `<+inputs.targetVersion>` when provided.
          5. If direct queries fail, use dashboard discovery tools as fallback,
             identify the exact panel/query needed, and retry once. If that still
             fails, return `UNKNOWN` with missing evidence. Do not fabricate
             versions.

          ## Turn budget

          Aim to finish in 3-5 turns:

          1. Direct `query_prometheus` calls.
          2. Interpret results and optionally perform one fallback query.
          3. Write `$DRONE_OUTPUT`.

          Do not perform exploratory dashboard searches when direct query results
          already contain production versions.

          ## Production environment matching

          Treat these as production environments unless inputs override them:

          - `prod0`
          - `prod1`
          - `prod2`
          - `prod3`
          - `prod4`
          - `eu1`
          - `eu-lloyd`
          - `harness0`

          ## Output requirements

          Print a short summary table:

          | Environment | Version | Matches target? | Source dashboard |
          |-------------|---------|-----------------|------------------|

          Then, as your final action, write these single-line outputs to
          `$DRONE_OUTPUT`:

          - `GRAFANA_VERSION_STATUS`
          - `GRAFANA_VERSION_SUMMARY`
          - `GRAFANA_VERSION_MATCHING_ENVS`
          - `GRAFANA_VERSION_ALL_ENVS`
          - `GRAFANA_VERSION_PACKET_B64`

          Use this decision contract:

          - `PASS`: at least one production environment reports a version, and all
            required queries succeeded.
          - `UNKNOWN`: dashboard/query access is missing, no production versions
            are found, or data cannot be tied to environment/version labels.

          Use this exact final output pattern, replacing `packet` with your final
          evidence packet:

          ```bash
          python3 - <<'PY'
          import base64
          import json
          import os

          packet = {
              "signal": "service_versions",
              "status": "UNKNOWN",
              "service": "<+inputs.service>",
              "deployment_mode": "<+inputs.deploymentMode>",
              "target_version": "<+inputs.targetVersion>",
              "lookback": "<+inputs.lookback>",
              "versions": [],
              "matching_environments": [],
              "all_environments": [],
              "dashboards_queried": [],
              "missing_evidence": ["final packet was not populated"],
              "summary": "Grafana version evidence was not populated."
          }

          output_path = os.environ.get("DRONE_OUTPUT")
          if not output_path:
              raise RuntimeError("DRONE_OUTPUT is not set; cannot publish Grafana outputs")

          packet_json = json.dumps(packet, separators=(",", ":"), sort_keys=True)
          packet_b64 = base64.b64encode(packet_json.encode("utf-8")).decode("ascii")
          matching_envs = ",".join(packet.get("matching_environments", []))
          all_envs = ",".join(packet.get("all_environments", []))
          summary = str(packet.get("summary", "")).replace("\n", " ")[:500]

          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"GRAFANA_VERSION_STATUS={packet.get('status', 'UNKNOWN')}\n")
              output.write(f"GRAFANA_VERSION_SUMMARY={summary}\n")
              output.write(f"GRAFANA_VERSION_MATCHING_ENVS={matching_envs}\n")
              output.write(f"GRAFANA_VERSION_ALL_ENVS={all_envs}\n")
              output.write(f"GRAFANA_VERSION_PACKET_B64={packet_b64}\n")
          PY
          ```

          ## Safety rules

          - Never print Grafana tokens, cookies, or datasource credentials.
          - Do not modify dashboards, alerts, folders, datasources, or annotations.
          - Do not infer production versions from dashboard names alone. Use query
            results or return `UNKNOWN`.
          - Keep raw output concise. If panel data is large, summarize versions and
            labels only.
        max_turns: 40
        mcp_format: harness
        mcp_servers: <+connectorInputs.resolveList(<+inputs.mcpConnectors>)>
      env:
        HARNESS_SKIP_ELICITATION: "true"
        PLUGIN_HARNESS_CONNECTOR: <+inputs.llmConnector.id>
        ANTHROPIC_MODEL: <+inputs.modelName>
  inputs:
    llmConnector:
      type: connector
      required: true
      default: connector_Anthropic_7581
    modelName:
      type: string
      default: claude-sonnet-4-5-20250929
    mcpConnectors:
      type: array
      default:
        - grafana_mcp
      ui:
        component: array
        input:
          inputType: connector
    service:
      type: string
      required: true
      default: genai-service
    deploymentMode:
      type: string
      default: auto
    prodEnvironments:
      type: string
      default: prod0,prod1,prod2,prod3,prod4,eu1,eu-lloyd,harness0
    lookback:
      type: string
      default: 3h
    targetVersion:
      type: string
    nonIeDashboardUrl:
      type: string
      default: https://monitoring.harness.io/d/ZJD3rKZIz/microservice-version-dashboard?orgId=1&from=now-3h&to=now&timezone=browser&var-datasource=9073961d-07a4-44b8-8bfd-4b32a4ee7a74&refresh=5m
    ieDashboardUrl:
      type: string
      default: https://monitoring.harness.io/d/ZJD3rKZI/microservice-version-dashboard-ie?orgId=1&from=now-5m&to=now&timezone=browser&var-service=genai-service
    maxSeries:
      type: string
      default: "100"
